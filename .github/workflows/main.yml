name: Run Java Program

on: [push] # This tells GitHub to run the code every time you upload/push changes

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Gets your code from the repo
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Compile and Run
        run: |
          javac Operations.java
          java Operations
